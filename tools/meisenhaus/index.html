<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meisenhaus</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #f0f4f0;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 4px;
            color: #2d5a27;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
        }

        .viewer {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .image-container {
            position: relative;
            background: #1a1a1a;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #main-img {
            width: 100%;
            display: block;
            border-radius: 0;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            display: none;
        }

        .image-info {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            gap: 8px;
            flex-wrap: wrap;
        }

        #timestamp {
            font-size: 1rem;
            font-weight: 600;
            color: #2d5a27;
        }

        #image-counter {
            font-size: 0.85rem;
            color: #888;
        }

        .controls {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .nav-btn:hover:not(:disabled) { background: #3d7a37; }
        .nav-btn:disabled { background: #bbb; cursor: default; }

        #history-select {
            flex: 1;
            min-width: 0;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
            cursor: pointer;
        }

        #error-msg {
            padding: 12px 16px;
            color: #c0392b;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🐦 Meisenhaus</h1>
    <p class="subtitle">Webcam-Bilder aus dem Meisenhaus</p>

    <div class="viewer">
        <div class="image-container">
            <img id="main-img" src="images/latest.jpg" alt="Aktuelles Bild aus dem Meisenhaus">
            <div id="loading-overlay">Lade Bild…</div>
        </div>

        <div class="image-info">
            <span id="timestamp">Aktuelles Bild</span>
            <span id="image-counter"></span>
        </div>

        <div class="controls">
            <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled>&#8592;</button>

            <select id="history-select" onchange="selectImage(this.value)">
                <option value="latest">Aktuelles Bild</option>
            </select>

            <button class="nav-btn" id="btn-next" onclick="navigate(1)" disabled>&#8594;</button>
        </div>

        <div id="error-msg"></div>
    </div>

    <script>
        // images[0] = latest, images[1..n] = history newest-first
        let images = [{ name: 'latest', path: 'images/latest.jpg', label: 'Aktuelles Bild' }];
        let currentIndex = 0;

        function formatTimestamp(filename) {
            // filename format: YYYYMMDD-HHMMSS
            const m = filename.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/);
            if (!m) return filename;
            return `${m[3]}.${m[2]}.${m[1]} ${m[4]}:${m[5]} Uhr`;
        }

        function showImage(index) {
            const img = images[index];
            const el = document.getElementById('main-img');
            const overlay = document.getElementById('loading-overlay');

            overlay.style.display = 'flex';
            el.src = img.path;
            el.onload = () => { overlay.style.display = 'none'; };
            el.onerror = () => {
                overlay.style.display = 'none';
                el.alt = 'Bild konnte nicht geladen werden.';
            };

            document.getElementById('timestamp').textContent = img.label;
            document.getElementById('history-select').value = img.name;

            const counter = document.getElementById('image-counter');
            if (images.length > 1) {
                counter.textContent = `${index + 1} / ${images.length}`;
            } else {
                counter.textContent = '';
            }

            document.getElementById('btn-prev').disabled = (index <= 0);
            document.getElementById('btn-next').disabled = (index >= images.length - 1);

            currentIndex = index;
        }

        function selectImage(name) {
            const idx = images.findIndex(img => img.name === name);
            if (idx !== -1) showImage(idx);
        }

        function navigate(delta) {
            const next = currentIndex + delta;
            if (next >= 0 && next < images.length) showImage(next);
        }

        async function loadHistory() {
            try {
                const res = await fetch(
                    'https://api.github.com/repos/mangenehm/mangenehm.github.io/contents/tools/meisenhaus/images'
                );
                if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
                const files = await res.json();

                const select = document.getElementById('history-select');

                files
                    .filter(f => f.name.endsWith('.jpg') && f.name !== 'latest.jpg')
                    .sort((a, b) => b.name.localeCompare(a.name))
                    .forEach(file => {
                        const baseName = file.name.replace('.jpg', '');
                        const label = formatTimestamp(baseName);
                        const entry = { name: baseName, path: `images/${file.name}`, label };
                        images.push(entry);

                        const opt = document.createElement('option');
                        opt.value = baseName;
                        opt.textContent = label;
                        select.appendChild(opt);
                    });

                if (images.length > 1) {
                    document.getElementById('btn-next').disabled = false;
                    document.getElementById('image-counter').textContent = `1 / ${images.length}`;
                }
            } catch (err) {
                const errEl = document.getElementById('error-msg');
                errEl.textContent = `Verlauf konnte nicht geladen werden: ${err.message}`;
                errEl.style.display = 'block';
            }
        }

        loadHistory();
    </script>
</body>
</html>
