<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schillingsmeise – Kamera-Galerie</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --brand: #22d3ee;
      --brand-2: #38bdf8;
      --border: #1f2937;
      --card: #0b1220;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
      --grad: linear-gradient(160deg, var(--bg), #0b1020 35%, #0a0f1a 100%);
      --radius: 16px;
    }
    html[data-theme="light"] {
      --bg: #f8fafc;
      --panel: #ffffff;
      --muted: #475569;
      --text: #0f172a;
      --brand: #06b6d4;
      --brand-2: #0ea5e9;
      --border: #e2e8f0;
      --card: #f1f5f9;
      --shadow: 0 6px 18px rgba(2,6,23,0.08);
      --grad: linear-gradient(160deg, #eef2ff, #f8fafc 40%, #ffffff 100%);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
      background: var(--grad);
      color: var(--text);
      transition: background .3s ease, color .3s ease;
    }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 1.6rem; margin: 6px 0 16px; letter-spacing: 0.2px; }

    .card {
      background: radial-gradient(1200px 600px at -10% -20%, rgba(34,211,238,0.06), transparent 70%),
                  radial-gradient(900px 600px at 120% 10%, rgba(56,189,248,0.06), transparent 70%),
                  var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .row { display: flex; gap: 10px; align-items: center; }
    .row.wrap { flex-wrap: wrap; }
    .spacer { flex: 1; }
    .muted { color: var(--muted); }
    .small { font-size: .88rem; }
    .hidden { display: none !important; }

    .pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.30);
      font-size: .8rem; white-space: nowrap;
    }
    html[data-theme="light"] .pill { background: rgba(255,255,255,0.70); }

    .badge-new {
      background: var(--brand); color: #0f172a;
      font-size: .72rem; font-weight: 800; padding: 3px 9px;
      border-radius: 999px; border: none; letter-spacing: .05em;
      text-transform: uppercase; white-space: nowrap;
    }

    button, .btn {
      appearance: none; border: 1px solid var(--border); color: var(--text);
      background: linear-gradient(180deg, #0f172a, #0b1220);
      padding: 8px 13px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform .06s ease, border-color .2s ease, background .2s ease;
      font-size: .9rem;
    }
    html[data-theme="light"] button, html[data-theme="light"] .btn {
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }
    button:hover { border-color: #2d4060; }
    html[data-theme="light"] button:hover { border-color: #cbd5e1; }
    button:active { transform: translateY(1px); }
    .btn-ghost { background: transparent; border-color: transparent; }
    .btn-icon { padding: 8px 11px; font-size: 1.1rem; background: transparent; border-color: transparent; }
    .btn-icon:hover { border-color: var(--border); }

    /* ── Hero ── */
    .hero-meta { margin-bottom: 8px; }
    .hero-wrap {
      position: relative; overflow: hidden;
      border-radius: calc(var(--radius) - 4px);
      background: var(--border);
    }
    .hero-wrap img {
      width: 100%; max-height: 68vh; object-fit: cover;
      display: block; border-radius: calc(var(--radius) - 4px);
      cursor: zoom-in;
    }
    .hero-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      border-radius: 0 0 calc(var(--radius) - 4px) calc(var(--radius) - 4px);
      pointer-events: none;
    }

    /* ── Hero Video ── */
    .hero-video-wrap {
      position: relative; overflow: hidden;
      border-radius: calc(var(--radius) - 4px);
      background: #000;
      line-height: 0;
    }
    .hero-video-wrap video {
      width: 100%; max-height: 68vh; object-fit: cover;
      display: block; border-radius: calc(var(--radius) - 4px);
    }
    .hero-video-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      border-radius: 0 0 calc(var(--radius) - 4px) calc(var(--radius) - 4px);
      pointer-events: none;
    }

    /* ── Timeline ── */
    .tl-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .tl-title { font-size: 1rem; font-weight: 700; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
    .tl-count { font-size: .82rem; color: var(--muted); }

    .selector-row {
      display: flex; gap: 6px;
      overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .selector-row::-webkit-scrollbar { height: 4px; }
    .selector-row::-webkit-scrollbar-track { background: transparent; }
    .selector-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sel-btn {
      white-space: nowrap; flex-shrink: 0;
      padding: 7px 13px; font-size: .88rem;
    }
    .sel-btn.active {
      border-color: var(--brand);
      background: linear-gradient(180deg, rgba(34,211,238,0.18), rgba(34,211,238,0.08));
      color: var(--brand);
    }
    html[data-theme="light"] .sel-btn.active {
      background: linear-gradient(180deg, rgba(6,182,212,0.12), rgba(6,182,212,0.06));
    }

    hr.tl-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* ── Gallery Grid ── */
    .gallery-grid {
      display: grid; gap: 8px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 480px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
    @media (min-width: 720px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1024px) { .gallery-grid { grid-template-columns: repeat(5, 1fr); } }

    .thumb-item {
      position: relative; overflow: hidden;
      border-radius: 10px; cursor: pointer;
      background: var(--border);
      aspect-ratio: 1 / 1;
      border: 1px solid var(--border);
      transition: transform .15s ease, border-color .15s ease;
    }
    .thumb-item:hover { transform: scale(1.03); border-color: var(--brand); }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 10px; }
    .thumb-ts {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 4px 6px;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
      font-size: .72rem; color: #e5e7eb;
      border-radius: 0 0 10px 10px;
    }

    /* ── Skeletons ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton {
      border-radius: 10px;
      background: linear-gradient(90deg, var(--border) 25%, #29374f 50%, var(--border) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    html[data-theme="light"] .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 600px 100%;
    }
    .skeleton-hero { width: 100%; aspect-ratio: 16 / 7; border-radius: calc(var(--radius) - 4px); }
    .skeleton-thumb { aspect-ratio: 1 / 1; }

    /* ── State containers ── */
    .state-box { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 1rem; }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Lightbox ── */
    dialog#lightbox {
      padding: 0; background: #050d1a; color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      max-width: min(96vw, 1100px); width: 100%; outline: none;
      overflow: hidden;
    }

    /* ── Lightbox filmstrip ── */
    .lb-strip {
      display: flex; gap: 5px;
      overflow-x: auto; padding: 8px 12px 10px;
      border-top: 1px solid var(--border);
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .lb-strip::-webkit-scrollbar { height: 4px; }
    .lb-strip::-webkit-scrollbar-track { background: transparent; }
    .lb-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .lb-strip-thumb {
      flex-shrink: 0; width: 52px; height: 52px;
      border-radius: 7px; overflow: hidden; cursor: pointer;
      border: 2px solid transparent; opacity: 0.55;
      transition: opacity .15s ease, border-color .15s ease;
    }
    .lb-strip-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lb-strip-thumb.active { border-color: var(--brand); opacity: 1; }
    .lb-strip-thumb:hover { opacity: 0.85; }
    dialog#lightbox::backdrop { background: rgba(2,6,23,0.82); }
    html[data-theme="light"] dialog#lightbox { background: #ffffff; }
    html[data-theme="light"] dialog#lightbox::backdrop { background: rgba(15,23,42,0.45); }
    .lb-header {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .lb-body {
      display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px;
    }
    .lb-body img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 10px; display: block; flex: 1; min-width: 0; }
    .lb-nav {
      font-size: 1.6rem; padding: 10px 14px; flex-shrink: 0;
      border-radius: 50%; width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-nav:disabled { opacity: .3; cursor: default; }
  </style>
</head>
<body>
<main>
  <header class="row wrap" style="margin-bottom:14px">
    <h1>🐦 Schillingsmeise</h1>
    <span class="spacer"></span>
    <button id="btnRefresh" class="btn btn-icon" title="Neu laden" aria-label="Galerie neu laden">↻</button>
    <button id="btnTheme" class="btn" title="Theme umschalten" aria-pressed="false">🌙 Dark</button>
  </header>

  <!-- Loading state -->
  <div id="stateLoading">
    <div class="card" style="margin-bottom:14px">
      <div class="skeleton skeleton-hero"></div>
    </div>
    <div class="card">
      <div class="gallery-grid" id="skeletonGrid"></div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="stateEmpty" class="card hidden">
    <div class="state-box">
      <div class="icon">📷</div>
      <p>Noch keine Bilder vorhanden.<br>Die Kamera ist bald aktiv!</p>
    </div>
  </div>

  <!-- Error state -->
  <div id="stateError" class="card hidden">
    <div class="state-box">
      <div class="icon">⚠️</div>
      <p>Bilder konnten nicht geladen werden.<br>
        <button id="btnRetry" class="btn" style="margin-top:12px">Erneut versuchen</button>
      </p>
    </div>
  </div>

  <!-- Gallery -->
  <div id="stateGallery" class="hidden">

    <!-- Hero Video -->
    <div id="heroVideoCard" class="card hidden" style="margin-bottom:14px; padding:12px;">
      <div class="row wrap hero-meta">
        <span class="tl-title">Live-Aufnahme</span>
        <span class="spacer"></span>
        <span class="pill muted small" id="heroVideoLabel">Video</span>
      </div>
      <div class="hero-video-wrap">
        <video id="heroVideo" autoplay muted loop playsinline
               preload="metadata" aria-label="Aktuellstes Video">
        </video>
        <div class="hero-video-label">
          <span class="pill" id="heroVideoTs"></span>
        </div>
      </div>
    </div>

    <!-- Hero -->
    <div class="card" style="margin-bottom:14px; padding:12px;">
      <div class="row wrap hero-meta">
        <span class="tl-title">Aktuellste Aufnahme</span>
        <span class="spacer"></span>
      </div>
      <div class="hero-wrap">
        <img id="heroImg" alt="Aktuellstes Bild" loading="eager" />
        <div class="hero-label">
          <span class="pill" id="heroTs"></span>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card">
      <div class="tl-header">
        <span class="tl-title">Alle Aufnahmen</span>
      </div>

      <!-- Month selector -->
      <div class="selector-row" id="monthSelector" role="tablist" aria-label="Monat wählen"></div>

      <hr class="tl-divider" />

      <!-- Day selector -->
      <div class="selector-row" id="daySelector" role="tablist" aria-label="Tag wählen"></div>

      <hr class="tl-divider" />

      <!-- Image grid for selected day -->
      <div id="dayGrid" class="gallery-grid"></div>
    </div>

  </div>
</main>

<!-- Lightbox -->
<dialog id="lightbox" aria-modal="true" aria-label="Bildvorschau">
  <div class="lb-header">
    <span class="pill" id="lbTs"></span>
    <span class="spacer"></span>
    <span class="pill muted" id="lbCounter"></span>
    <button id="lbClose" class="btn btn-ghost" aria-label="Schließen" style="padding:6px 10px; font-size:1.1rem;">✕</button>
  </div>
  <div class="lb-body">
    <button id="lbPrev" class="lb-nav btn" aria-label="Vorheriges Bild">‹</button>
    <img id="lbImg" alt="Vergrößertes Bild" />
    <button id="lbNext" class="lb-nav btn" aria-label="Nächstes Bild">›</button>
  </div>
  <div class="lb-strip" id="lbStrip" role="listbox" aria-label="Aufnahmen"></div>
</dialog>

<script>
(() => {
  const MANIFEST    = 'images.json';
  const IMAGES_PATH = 'images/';
  const VIDEO_PATH  = 'images/hero.mp4';
  const THEME_KEY   = 'schillingsmeise-theme';
  const SKELETON_N  = 10;

  const $  = (sel, r = document) => r.querySelector(sel);
  const $$ = (sel, r = document) => Array.from(r.querySelectorAll(sel));

  // ── Filename helpers ───────────────────────────────────────────────────────
  // Format: "20260326-150000.jpg"

  function parseParts(fn) {
    const m = fn.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})\./);
    if (!m) return null;
    return { yyyy: m[1], mm: m[2], dd: m[3], hh: m[4], min: m[5], ss: m[6] };
  }

  function getMonthKey(fn) {
    const p = parseParts(fn); return p ? `${p.yyyy}-${p.mm}` : null;
  }
  function getDayKey(fn) {
    const p = parseParts(fn); return p ? `${p.yyyy}-${p.mm}-${p.dd}` : null;
  }
  function getTimeLabel(fn) {
    const p = parseParts(fn); return p ? `${p.hh}:${p.min}` : fn;
  }
  function formatFullTs(fn) {
    const p = parseParts(fn);
    return p ? `${p.dd}.${p.mm}.${p.yyyy}, ${p.hh}:${p.min}:${p.ss}` : fn;
  }

  const DE_MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const DE_DAYS   = ['So.','Mo.','Di.','Mi.','Do.','Fr.','Sa.'];

  function formatMonth(key) {
    // key = "2026-03"
    const [yyyy, mm] = key.split('-');
    return `${DE_MONTHS[parseInt(mm, 10) - 1]} ${yyyy}`;
  }
  function formatDay(key) {
    // key = "2026-03-26"
    const [yyyy, mm, dd] = key.split('-');
    const dow = DE_DAYS[new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd)).getDay()];
    return `${dow} ${parseInt(dd, 10)}.${mm}.`;
  }

  // ── Theme ─────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    const btn = $('#btnTheme');
    if (!btn) return;
    const dark = theme !== 'light';
    btn.setAttribute('aria-pressed', String(dark));
    btn.textContent = dark ? '🌙\u00A0Dark' : '☀️\u00A0Light';
    btn.title = dark ? 'Zu Light wechseln' : 'Zu Dark wechseln';
  }
  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || saved === 'light') { applyTheme(saved); return; }
    applyTheme(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let allImages  = [];
  let monthMap   = new Map();  // Map<"YYYY-MM", Map<"YYYY-MM-DD", string[]>>
  let activeMonth = null;
  let activeDay   = null;
  let viewImages  = [];        // images visible in current day grid (for lightbox)
  let lbIndex     = 0;
  const lb        = $('#lightbox');

  // ── Build month map ────────────────────────────────────────────────────────
  function buildMonthMap(images) {
    const map = new Map();
    for (const fn of images) {
      const mk = getMonthKey(fn);
      const dk = getDayKey(fn);
      if (!mk || !dk) continue;
      if (!map.has(mk)) map.set(mk, new Map());
      const dayMap = map.get(mk);
      if (!dayMap.has(dk)) dayMap.set(dk, []);
      dayMap.get(dk).push(fn);
    }
    return map;
  }

  // ── State switch ──────────────────────────────────────────────────────────
  function showState(name) {
    ['stateLoading','stateEmpty','stateError','stateGallery'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('hidden', id !== name);
    });
  }

  // ── Hero Video ────────────────────────────────────────────────────────────
  function initHeroVideo() {
    const video = $('#heroVideo');
    const card  = $('#heroVideoCard');
    if (!video || !card) return;

    video.addEventListener('loadedmetadata', () => {
      card.classList.remove('hidden');
      const label = $('#heroVideoLabel');
      if (label && video.duration && isFinite(video.duration)) {
        const m = Math.floor(video.duration / 60);
        const s = Math.floor(video.duration % 60);
        label.textContent = m > 0 ? `${m} min ${s} s` : `${s} s`;
      }
      const ts = $('#heroVideoTs');
      const name = VIDEO_PATH.split('/').pop().replace(/\.[^.]+$/, '');
      const p = name.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/);
      if (ts) ts.textContent = p ? `${p[3]}.${p[2]}.${p[1]}, ${p[4]}:${p[5]}:${p[6]}` : 'Video';
    });
    video.addEventListener('error', () => { card.classList.add('hidden'); });

    video.src = VIDEO_PATH;
  }

  // ── Hero ──────────────────────────────────────────────────────────────────
  function renderHero(fn) {
    const img = $('#heroImg');
    img.src = IMAGES_PATH + fn;
    img.alt = 'Aktuellstes Bild – ' + formatFullTs(fn);
    img.onerror = () => { img.closest('.hero-wrap').style.display = 'none'; };
    img.onclick = () => openLightboxGlobal(0);
    $('#heroTs').textContent = formatFullTs(fn);
  }

  // ── Timeline ──────────────────────────────────────────────────────────────
  function renderTimeline() {
    renderMonthSelector();
    renderDaySelector();
    renderDayGrid();
  }

  function renderMonthSelector() {
    const row = $('#monthSelector');
    row.innerHTML = '';
    const months = [...monthMap.keys()].sort().reverse();
    months.forEach(mk => {
      const btn = document.createElement('button');
      btn.className = 'btn sel-btn' + (mk === activeMonth ? ' active' : '');
      btn.textContent = formatMonth(mk);
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', String(mk === activeMonth));
      btn.onclick = () => selectMonth(mk);
      row.appendChild(btn);
    });
  }

  function renderDaySelector() {
    const row = $('#daySelector');
    row.innerHTML = '';
    if (!activeMonth || !monthMap.has(activeMonth)) return;
    const days = [...monthMap.get(activeMonth).keys()].sort().reverse();
    days.forEach(dk => {
      const btn = document.createElement('button');
      btn.className = 'btn sel-btn' + (dk === activeDay ? ' active' : '');
      btn.textContent = formatDay(dk);
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', String(dk === activeDay));
      btn.onclick = () => selectDay(dk);
      row.appendChild(btn);
    });
  }

  function renderDayGrid() {
    const grid = $('#dayGrid');
    grid.innerHTML = '';
    if (!activeMonth || !activeDay) return;
    const dm = monthMap.get(activeMonth);
    if (!dm || !dm.has(activeDay)) return;

    viewImages = dm.get(activeDay);

    viewImages.forEach((fn, idx) => {
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', 'Bild um ' + getTimeLabel(fn) + ' Uhr öffnen');

      const img = document.createElement('img');
      img.src = IMAGES_PATH + fn;
      img.alt = 'Aufnahme ' + getTimeLabel(fn);
      img.loading = 'lazy';
      img.onerror = () => { item.style.display = 'none'; };

      const ts = document.createElement('div');
      ts.className = 'thumb-ts';
      ts.textContent = getTimeLabel(fn);

      item.append(img, ts);

      const open = () => openLightboxView(idx);
      item.addEventListener('click', open);
      item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });

      grid.appendChild(item);
    });
  }

  function selectMonth(mk) {
    activeMonth = mk;
    const days = [...monthMap.get(mk).keys()].sort().reverse();
    activeDay = days[0] || null;
    renderTimeline();
  }

  function selectDay(dk) {
    activeDay = dk;
    renderDaySelector();
    renderDayGrid();
  }

  // ── Lightbox (view = current day) ─────────────────────────────────────────
  function renderStrip(imgs) {
    const strip = $('#lbStrip');
    strip.innerHTML = '';
    imgs.forEach((fn, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'lb-strip-thumb' + (i === lbIndex ? ' active' : '');
      thumb.setAttribute('role', 'option');
      thumb.setAttribute('aria-selected', String(i === lbIndex));
      thumb.setAttribute('aria-label', 'Aufnahme ' + getTimeLabel(fn));
      const img = document.createElement('img');
      img.src = IMAGES_PATH + fn;
      img.alt = '';
      img.loading = 'lazy';
      thumb.appendChild(img);
      thumb.addEventListener('click', () => { lbIndex = i; updateLightbox(imgs); });
      strip.appendChild(thumb);
    });
  }

  function openLightboxView(idx) {
    lbIndex = idx;
    renderStrip(viewImages);
    updateLightbox(viewImages);
    if (typeof lb.showModal === 'function') lb.showModal();
    requestAnimationFrame(() => {
      const t = $('#lbStrip').children[lbIndex];
      if (t) t.scrollIntoView({ inline: 'center', block: 'nearest' });
    });
  }

  // Hero lightbox navigates allImages
  function openLightboxGlobal(idx) {
    viewImages = allImages;
    lbIndex = idx;
    renderStrip(viewImages);
    updateLightbox(viewImages);
    if (typeof lb.showModal === 'function') lb.showModal();
    requestAnimationFrame(() => {
      const t = $('#lbStrip').children[lbIndex];
      if (t) t.scrollIntoView({ inline: 'center', block: 'nearest' });
    });
  }

  function closeLightbox() { lb.close(); }

  function navLightbox(delta) {
    lbIndex = (lbIndex + delta + viewImages.length) % viewImages.length;
    updateLightbox(viewImages);
  }

  function updateLightbox(imgs) {
    const fn = imgs[lbIndex];
    $('#lbImg').src = IMAGES_PATH + fn;
    $('#lbImg').alt = 'Aufnahme ' + formatFullTs(fn);
    $('#lbTs').textContent = formatFullTs(fn);
    $('#lbCounter').textContent = (lbIndex + 1) + ' / ' + imgs.length;
    $('#lbPrev').disabled = imgs.length <= 1;
    $('#lbNext').disabled = imgs.length <= 1;
    // Filmstreifen synchronisieren
    const strip = $('#lbStrip');
    $$('.lb-strip-thumb', strip).forEach((el, i) => {
      const active = i === lbIndex;
      el.classList.toggle('active', active);
      el.setAttribute('aria-selected', String(active));
    });
    const activeThumb = strip.children[lbIndex];
    if (activeThumb) activeThumb.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  }

  // ── Skeletons ─────────────────────────────────────────────────────────────
  function buildSkeletons() {
    const grid = $('#skeletonGrid');
    for (let i = 0; i < SKELETON_N; i++) {
      const d = document.createElement('div');
      d.className = 'skeleton skeleton-thumb';
      grid.appendChild(d);
    }
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function loadImages() {
    showState('stateLoading');
    try {
      const res = await fetch(MANIFEST + '?v=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('Ungültiges Format');
      allImages = data;
      if (allImages.length === 0) { showState('stateEmpty'); return; }

      monthMap = buildMonthMap(allImages);

      // Default selection: newest month + newest day
      const months = [...monthMap.keys()].sort().reverse();
      activeMonth = months[0];
      const days = [...monthMap.get(activeMonth).keys()].sort().reverse();
      activeDay = days[0];

      renderHero(allImages[0]);
      renderTimeline();
      showState('stateGallery');
    } catch (e) {
      showState('stateError');
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  function boot() {
    initTheme();
    buildSkeletons();
    initHeroVideo();

    $('#btnTheme').addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      applyTheme(cur === 'dark' ? 'light' : 'dark');
    });
    $('#btnRefresh').addEventListener('click', loadImages);
    $('#btnRetry').addEventListener('click', loadImages);

    $('#lbClose').addEventListener('click', closeLightbox);
    $('#lbPrev').addEventListener('click', () => navLightbox(-1));
    $('#lbNext').addEventListener('click', () => navLightbox(+1));
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lb.open) return;
      if (e.key === 'Escape')     { e.preventDefault(); closeLightbox(); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); navLightbox(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); navLightbox(+1); }
    });

    // Touch-Swipe für Lightbox
    let _touchStartX = 0, _touchStartY = 0;
    const lbBody = $('.lb-body');
    lbBody.addEventListener('touchstart', e => {
      _touchStartX = e.changedTouches[0].clientX;
      _touchStartY = e.changedTouches[0].clientY;
    }, { passive: true });
    lbBody.addEventListener('touchend', e => {
      if (!lb.open) return;
      const dx = e.changedTouches[0].clientX - _touchStartX;
      const dy = e.changedTouches[0].clientY - _touchStartY;
      if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
      navLightbox(dx < 0 ? +1 : -1);
    }, { passive: true });

    loadImages();
  }

  boot();
})();
</script>
</body>
</html>
