<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meisenkasten – Kamera-Galerie</title>
  <style>
    :root {
      /* Dark (default) */
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --brand: #22d3ee;
      --brand-2: #38bdf8;
      --border: #1f2937;
      --card: #0b1220;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
      --grad: linear-gradient(160deg, var(--bg), #0b1020 35%, #0a0f1a 100%);
      --radius: 16px;
      --overlay: rgba(2,6,23,0.70);
    }
    html[data-theme="light"] {
      --bg: #f8fafc;
      --panel: #ffffff;
      --muted: #475569;
      --text: #0f172a;
      --brand: #06b6d4;
      --brand-2: #0ea5e9;
      --border: #e2e8f0;
      --card: #f1f5f9;
      --shadow: 0 6px 18px rgba(2,6,23,0.08);
      --grad: linear-gradient(160deg, #eef2ff, #f8fafc 40%, #ffffff 100%);
      --overlay: rgba(15,23,42,0.55);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
      background: var(--grad);
      color: var(--text);
      transition: background .3s ease, color .3s ease;
    }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 1.6rem; margin: 6px 0 16px; letter-spacing: 0.2px; }
    h2 { font-size: 1.1rem; color: var(--muted); margin: 0 0 12px; font-weight: 600; }

    .card {
      background: radial-gradient(1200px 600px at -10% -20%, rgba(34,211,238,0.06), transparent 70%),
                  radial-gradient(900px 600px at 120% 10%, rgba(56,189,248,0.06), transparent 70%),
                  var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .row { display: flex; gap: 12px; align-items: center; }
    .row.wrap { flex-wrap: wrap; }
    .spacer { flex: 1; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.30);
      font-size: .8rem; white-space: nowrap;
    }
    html[data-theme="light"] .pill { background: rgba(255,255,255,0.70); }
    .hidden { display: none !important; }

    button, .btn {
      appearance: none; border: 1px solid var(--border); color: var(--text);
      background: linear-gradient(180deg, #0f172a, #0b1220);
      padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 600;
      transition: transform .06s ease, border-color .2s ease, background .2s ease;
      font-size: .95rem;
    }
    html[data-theme="light"] button, html[data-theme="light"] .btn {
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }
    button:hover { border-color: #23324b; }
    html[data-theme="light"] button:hover { border-color: #cbd5e1; }
    button:active { transform: translateY(1px); }
    .btn-ghost { background: transparent; border-color: transparent; }
    .btn-icon {
      padding: 8px 12px; font-size: 1.1rem; border-radius: 10px;
      background: transparent; border-color: transparent;
    }
    .btn-icon:hover { border-color: var(--border); }

    /* ── Hero ── */
    .hero-wrap {
      position: relative; overflow: hidden;
      border-radius: calc(var(--radius) - 4px);
      background: var(--border);
      margin-bottom: 0;
    }
    .hero-wrap img {
      width: 100%; max-height: 68vh; object-fit: cover;
      display: block; border-radius: calc(var(--radius) - 4px);
    }
    .hero-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      border-radius: 0 0 calc(var(--radius) - 4px) calc(var(--radius) - 4px);
    }
    .badge-new {
      background: var(--brand); color: #0f172a;
      font-size: .72rem; font-weight: 800; padding: 2px 8px;
      border-radius: 999px; border: none; letter-spacing: .05em;
      text-transform: uppercase;
    }

    /* ── Gallery Grid ── */
    .gallery-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 480px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
    @media (min-width: 720px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1024px) { .gallery-grid { grid-template-columns: repeat(5, 1fr); } }

    .thumb-item {
      position: relative; overflow: hidden;
      border-radius: 10px; cursor: pointer;
      background: var(--border);
      aspect-ratio: 1 / 1;
      border: 1px solid var(--border);
      transition: transform .15s ease, border-color .15s ease;
    }
    .thumb-item:hover { transform: scale(1.03); border-color: var(--brand); }
    .thumb-item img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; border-radius: 10px;
      loading: lazy;
    }
    .thumb-ts {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 4px 6px;
      background: linear-gradient(to top, rgba(0,0,0,0.70) 0%, transparent 100%);
      font-size: .7rem; color: #e5e7eb;
      border-radius: 0 0 10px 10px;
    }

    /* ── Skeletons ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      border-radius: 10px;
      background: linear-gradient(90deg, var(--border) 25%, #29374f 50%, var(--border) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    html[data-theme="light"] .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 600px 100%;
    }
    .skeleton-hero { width: 100%; aspect-ratio: 16 / 7; border-radius: calc(var(--radius) - 4px); }
    .skeleton-thumb { aspect-ratio: 1 / 1; }

    /* ── State containers ── */
    .state-box {
      text-align: center; padding: 48px 20px;
      color: var(--muted); font-size: 1rem;
    }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Lightbox dialog ── */
    dialog#lightbox {
      padding: 0; background: #050d1a; color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      max-width: min(96vw, 1100px); width: 100%;
      outline: none;
    }
    dialog#lightbox::backdrop { background: rgba(2,6,23,0.82); }
    html[data-theme="light"] dialog#lightbox { background: #ffffff; }
    html[data-theme="light"] dialog#lightbox::backdrop { background: rgba(15,23,42,0.45); }

    .lb-header {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .lb-body {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px;
    }
    .lb-body img {
      max-width: 100%; max-height: 80vh;
      object-fit: contain; border-radius: 10px; display: block;
      flex: 1; min-width: 0;
    }
    .lb-nav {
      font-size: 1.6rem; padding: 10px 14px; flex-shrink: 0;
      border-radius: 50%; width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-nav:disabled { opacity: .3; cursor: default; }
  </style>
</head>
<body>
<main>
  <header class="row wrap" style="margin-bottom:14px">
    <h1>🐦 Meisenkasten</h1>
    <span class="spacer"></span>
    <button id="btnRefresh" class="btn btn-icon" title="Neu laden" aria-label="Galerie neu laden">↻</button>
    <button id="btnTheme" class="btn" title="Theme umschalten" aria-pressed="false">🌙 Dark</button>
  </header>

  <!-- Loading state -->
  <div id="stateLoading">
    <div class="card" style="margin-bottom:14px">
      <div class="skeleton skeleton-hero"></div>
    </div>
    <div class="card">
      <div class="gallery-grid" id="skeletonGrid"></div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="stateEmpty" class="card hidden">
    <div class="state-box">
      <div class="icon">📷</div>
      <p>Noch keine Bilder vorhanden.<br>Die Kamera ist bald aktiv!</p>
    </div>
  </div>

  <!-- Error state -->
  <div id="stateError" class="card hidden">
    <div class="state-box">
      <div class="icon">⚠️</div>
      <p>Bilder konnten nicht geladen werden.<br>
         <button id="btnRetry" class="btn" style="margin-top:12px">Erneut versuchen</button>
      </p>
    </div>
  </div>

  <!-- Gallery (shown when images loaded) -->
  <div id="stateGallery" class="hidden">
    <!-- Hero -->
    <div class="card" style="margin-bottom:14px; padding: 12px;">
      <div class="hero-wrap">
        <img id="heroImg" alt="Aktuellstes Bild" loading="eager" />
        <div class="hero-label">
          <span class="badge-new">Aktuell</span>
          <span class="pill" id="heroTs"></span>
          <span class="spacer"></span>
          <span class="pill muted" id="heroCount"></span>
        </div>
      </div>
    </div>

    <!-- Grid -->
    <div class="card">
      <h2>Alle Aufnahmen</h2>
      <div id="galleryGrid" class="gallery-grid"></div>
    </div>
  </div>
</main>

<!-- Lightbox -->
<dialog id="lightbox" aria-modal="true" aria-label="Bildvorschau">
  <div class="lb-header">
    <span class="pill" id="lbTs"></span>
    <span class="spacer"></span>
    <span class="pill muted" id="lbCounter"></span>
    <button id="lbClose" class="btn btn-ghost" aria-label="Schließen" style="padding:6px 10px; font-size:1.1rem;">✕</button>
  </div>
  <div class="lb-body">
    <button id="lbPrev" class="lb-nav btn" aria-label="Vorheriges Bild">‹</button>
    <img id="lbImg" alt="Vergrößertes Bild" />
    <button id="lbNext" class="lb-nav btn" aria-label="Nächstes Bild">›</button>
  </div>
</dialog>

<script>
(() => {
  const MANIFEST    = 'images.json';
  const IMAGES_PATH = 'images/';
  const THEME_KEY   = 'meisenkasten-theme';
  const SKELETON_COUNT = 10;

  const $  = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  // ── Timestamp parser ──────────────────────────────────────────────────────
  // Input:  "20260311-150000.jpg"
  // Output: "11.03.2026, 15:00:00"
  function parseFilename(filename) {
    const m = filename.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})\./);
    if (!m) return filename;
    const [, yyyy, mm, dd, hh, min, ss] = m;
    return `${dd}.${mm}.${yyyy}, ${hh}:${min}:${ss}`;
  }

  // ── Theme ─────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    const btn = $('#btnTheme');
    if (!btn) return;
    const dark = theme !== 'light';
    btn.setAttribute('aria-pressed', String(dark));
    btn.textContent = dark ? '🌙\u00A0Dark' : '☀️\u00A0Light';
    btn.title = dark ? 'Zu Light wechseln' : 'Zu Dark wechseln';
  }

  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || saved === 'light') { applyTheme(saved); return; }
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(prefersDark ? 'dark' : 'light');
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let images   = [];
  let lbIndex  = 0;
  const lb     = $('#lightbox');

  // ── Loading skeletons ─────────────────────────────────────────────────────
  function buildSkeletons() {
    const grid = $('#skeletonGrid');
    for (let i = 0; i < SKELETON_COUNT; i++) {
      const d = document.createElement('div');
      d.className = 'skeleton skeleton-thumb';
      grid.appendChild(d);
    }
  }

  // ── State switches ────────────────────────────────────────────────────────
  function showState(name) {
    ['stateLoading', 'stateEmpty', 'stateError', 'stateGallery'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('hidden', id !== name);
    });
  }

  // ── Render hero ───────────────────────────────────────────────────────────
  function renderHero(filename) {
    const img = $('#heroImg');
    img.src = IMAGES_PATH + filename;
    img.alt = 'Aktuellstes Bild – ' + parseFilename(filename);
    img.onerror = () => {
      img.closest('.hero-wrap').style.display = 'none';
    };
    img.addEventListener('click', () => openLightbox(0));
    img.style.cursor = 'zoom-in';
    $('#heroTs').textContent = parseFilename(filename);
    $('#heroCount').textContent = images.length + ' Aufnahme' + (images.length !== 1 ? 'n' : '');
  }

  // ── Render gallery grid ───────────────────────────────────────────────────
  function renderGrid() {
    const grid = $('#galleryGrid');
    grid.innerHTML = '';
    images.forEach((filename, index) => {
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', 'Bild vom ' + parseFilename(filename) + ' öffnen');

      const img = document.createElement('img');
      img.src = IMAGES_PATH + filename;
      img.alt = 'Aufnahme ' + parseFilename(filename);
      img.loading = 'lazy';
      img.onerror = () => { item.style.display = 'none'; };

      const ts = document.createElement('div');
      ts.className = 'thumb-ts';
      ts.textContent = parseFilename(filename);

      item.appendChild(img);
      item.appendChild(ts);

      const open = () => openLightbox(index);
      item.addEventListener('click', open);
      item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });

      grid.appendChild(item);
    });
  }

  // ── Lightbox ──────────────────────────────────────────────────────────────
  function openLightbox(index) {
    lbIndex = index;
    updateLightbox();
    if (typeof lb.showModal === 'function') lb.showModal();
  }

  function closeLightbox() {
    lb.close();
  }

  function navLightbox(delta) {
    lbIndex = (lbIndex + delta + images.length) % images.length;
    updateLightbox();
  }

  function updateLightbox() {
    const filename = images[lbIndex];
    $('#lbImg').src = IMAGES_PATH + filename;
    $('#lbImg').alt = 'Aufnahme ' + parseFilename(filename);
    $('#lbTs').textContent = parseFilename(filename);
    $('#lbCounter').textContent = (lbIndex + 1) + ' / ' + images.length;
    $('#lbPrev').disabled = images.length <= 1;
    $('#lbNext').disabled = images.length <= 1;
  }

  // ── Fetch & init gallery ──────────────────────────────────────────────────
  async function loadImages() {
    showState('stateLoading');
    try {
      const res = await fetch(MANIFEST + '?v=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('Ungültiges Format');
      images = data;
      if (images.length === 0) {
        showState('stateEmpty');
        return;
      }
      renderHero(images[0]);
      renderGrid();
      showState('stateGallery');
    } catch (e) {
      showState('stateError');
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  function boot() {
    initTheme();
    buildSkeletons();

    $('#btnTheme').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    $('#btnRefresh').addEventListener('click', loadImages);
    $('#btnRetry').addEventListener('click', loadImages);

    $('#lbClose').addEventListener('click', closeLightbox);
    $('#lbPrev').addEventListener('click', () => navLightbox(-1));
    $('#lbNext').addEventListener('click', () => navLightbox(+1));

    lb.addEventListener('click', e => {
      if (e.target === lb) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lb.open) return;
      if (e.key === 'Escape')      { e.preventDefault(); closeLightbox(); }
      if (e.key === 'ArrowLeft')   { e.preventDefault(); navLightbox(-1); }
      if (e.key === 'ArrowRight')  { e.preventDefault(); navLightbox(+1); }
    });

    loadImages();
  }

  boot();
})();
</script>
</body>
</html>
